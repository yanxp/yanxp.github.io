name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  html-lint:
    name: HTML / link validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install htmlhint
        run: npm install -g htmlhint@1.1.4

      - name: Run htmlhint
        run: htmlhint --config .htmlhintrc "*.html"

      - name: Validate sitemap/feed XML
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq libxml2-utils
          xmllint --noout sitemap.xml
          xmllint --noout feed.xml
