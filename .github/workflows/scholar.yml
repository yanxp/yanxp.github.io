name: Update Scholar stats

on:
  schedule:
    # Every Monday at 03:17 UTC (off-peak, less likely to hit rate limits)
    - cron: '17 3 * * 1'
  workflow_dispatch:

concurrency:
  group: scholar-stats
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch Scholar stats
        id: fetch
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: |
          python scripts/fetch_scholar.py

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet assets/data/scholar.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add assets/data/scholar.json
          git commit -m "chore: update Scholar stats [skip ci]"
          git push
